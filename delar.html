<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  </head>

<body>
  <div class="rubrik">
        <h1>Betygskriterier i Samhällskunskap</h1>
    
<div class="val-box">
    <label>Vilken läroplan följer du?</label>
    <select id="systemVal" onchange="bytSystem()">
        <option value="">-- Välj system --</option>
        <option value="gy11">Gy11 (Gamla)</option>
        <option value="gy25">Gy25 (Nya)</option>
    </select>
</div>

<div id="kurs-sektion" class="gömd">
    <hr> <h2 id="dynamisk-rubrik">Välj din kurs</h2> 
    
    <div id="valavkurs-gy11" class="gömd">
        <select id="kursVal-gy11" onchange="visaKnappar()">
            <option value="">-- Välj Gy11-kurs --</option>
            <option value="sam1b">Samhällskunskap 1b</option>
            <option value="sam2">Samhällskunskap 2</option>
        </select>
    </div>

    <div id="valavkurs-gy25" class="gömd">
        <select id="kursVal-gy25" onchange="visaKnappar()">
            <option value="">-- Välj Gy25-nivå --</option>
            <option value="sam_n1">Samhällskunskap nivå 1</option>
            <option value="sam_n2">Samhällskunskap nivå 2</option>
        </select>
    </div>
</div>

<div id="betyg-sektion" class="gömd">
    <h3>Välj betyg för att se krav</h3>
    <div class="betygs-val">
        <button class="btn e" onclick="visaKrav('E')">E</button>
        <button class="btn c" onclick="visaKrav('C')">C</button>
        <button class="btn a" onclick="visaKrav('A')">A</button>
    </div>
</div>
</html>
