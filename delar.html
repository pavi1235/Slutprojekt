 <div class="system-val">

  </select>
</div>

   
   
   
    <div id="valavkurs-gy11"class="gömmd">

    <option value="">-- Välj kurs --</option>
    <option value="sam1a1">Samhällskunskap 1a1</option>
    <option value="sam1a2">Samhällskunskap 1a2</option>

  <div class="betygs-val">

   <div id="display" class="info-ruta">
